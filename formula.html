<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./assets/formula-icon.png" type="image/png">
  <title>Temperature Conversion Formulas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body, html {
      width: 100%;
      height: 100%;
      background-color: #0f1923;
    }
    #image-container {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 1rem;
      overflow: auto;
    }
    #image {
      width: 100%;
      max-width: 900px;
      height: auto;
      border-radius: 1rem;
      box-shadow: 0 0.5rem 2rem rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
  <div id="image-container">
    <img id="image" src="./assets/formula-chart.jpg" alt="Temperature Conversion Formulas Chart">
  </div>
</body>
</html>
